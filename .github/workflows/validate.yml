name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile helper scripts
        run: |
          python -m py_compile $(find skills/paper-interpretation/scripts -name '*.py' -print)
      - name: Check installer shell syntax
        run: |
          sh -n install.sh
      - name: Validate skill shape
        run: |
          python scripts/validate_skill_shape.py
      - name: Smoke-test installer lifecycle
        run: |
          chmod +x install.sh
          export CODEX_HOME="$RUNNER_TEMP/codex-home"
          ./install.sh install
          ./install.sh doctor
          ./install.sh upgrade
          test -f "$CODEX_HOME/skills/paper-interpretation/SKILL.md"
          test -f "$CODEX_HOME/skills/paper-interpretation/VERSION"
          test -n "$(find "$CODEX_HOME/skills" -maxdepth 1 -name 'paper-interpretation.backup.*' -print)"
          ./install.sh uninstall --purge-backups
          test ! -e "$CODEX_HOME/skills/paper-interpretation"
          test -z "$(find "$CODEX_HOME/skills" -maxdepth 1 -name 'paper-interpretation.backup.*' -print)"
